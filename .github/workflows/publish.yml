name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build:plugin

      - name: Build app
        run: npm run build:app

      - name: Run tests
        run: npm test

      - name: Bundle app into plugin
        run: cd packages/plugin && npm run bundle-app

      - name: Publish to npm
        run: cd packages/plugin && npm publish --provenance --access public
